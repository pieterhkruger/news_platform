services:
  # Added: the course notes use SQLite; this project uses MySQL, so a
  # separate database service is required.
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_NAME:-news_platform}
      MYSQL_USER: ${DB_USER:-news_platform_user}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: rootpassword
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping --protocol=tcp -h 127.0.0.1 -P 3306 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    ports:
      # 3307 on the host avoids clashing with a locally installed MySQL/MariaDB.
      - "3307:3306"

  web:
    build: .
    # Added: course notes use 'python manage.py runserver 0.0.0.0:8000' directly.
    # Wait for MySQL TCP connections using the app credentials, then migrate
    # before the dev server starts so first-boot initialisation works even on
    # slower machines where MySQL finishes container startup before it is ready
    # for real network clients.
    command: >
      sh -c "until python -c \"import os, MySQLdb; MySQLdb.connect(host=os.getenv('DB_HOST', 'db'), user=os.getenv('DB_USER', 'news_platform_user'), passwd=os.getenv('DB_PASSWORD', ''), db=os.getenv('DB_NAME', 'news_platform'), port=int(os.getenv('DB_PORT', '3306')))\"; do
               echo 'Waiting for MySQL...';
               sleep 2;
             done &&
             python manage.py migrate --no-input &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    # Added: loads DB_NAME, DB_USER, DB_PASSWORD, SECRET_KEY, etc. from .env.
    env_file:
      - .env
    environment:
      # Added: overrides DB_HOST from .env. Inside Docker, 'db' is the
      # database container's hostname; 127.0.0.1 would point to the web
      # container itself and the connection would be refused.
      - DB_HOST=db
    # Added: ensures Django waits for the database container to become ready.
    depends_on:
      db:
        condition: service_healthy
