services:
  # Added: the course notes use SQLite; this project uses MySQL, so a
  # separate database service is required.
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_NAME:-news_platform}
      MYSQL_USER: ${DB_USER:-news_platform_user}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: rootpassword
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    ports:
      # 3307 on the host avoids clashing with a locally installed MySQL/MariaDB.
      - "3307:3306"

  web:
    build: .
    # Added: course notes use 'python manage.py runserver 0.0.0.0:8000' directly.
    # Wait for MySQL to report healthy, then migrate before the dev server
    # starts so schema creation and demo seeding succeed on first boot.
    command: >
      sh -c "python manage.py migrate --no-input &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    # Added: loads DB_NAME, DB_USER, DB_PASSWORD, SECRET_KEY, etc. from .env.
    env_file:
      - .env
    environment:
      # Added: overrides DB_HOST from .env. Inside Docker, 'db' is the
      # database container's hostname; 127.0.0.1 would point to the web
      # container itself and the connection would be refused.
      - DB_HOST=db
    # Added: ensures Django waits for the database container to become ready.
    depends_on:
      db:
        condition: service_healthy
