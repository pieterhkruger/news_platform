{% extends "base.html" %}

{% block title %}Password Reset Complete — The Daily Indaba{% endblock %}

{% block content %}
<div style="max-width:520px;margin:2rem auto;">

  <h1 style="font-family:var(--font-serif);font-size:1.8rem;margin-bottom:.25rem;">
    Password Updated
  </h1>
  <p style="color:var(--text-muted);margin-bottom:1.5rem;font-size:.9rem;">
    Your new password has been saved successfully.
  </p>

  <div class="card">
    <div class="card-body" style="padding:1.6rem;">
      <p style="margin-bottom:1rem;">
        You can now sign in with your new password.
      </p>
      <a href="{% url 'accounts:login' %}" class="btn btn-primary">
        Log In
      </a>
    </div>
  </div>

</div>
{% endblock %}
